<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mots Croisés</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#1a1a2e;--paper:#f5f0e8;--cream:#ede8db;
  --gold:#c9a84c;--gold-l:#e8c96a;--rust:#c45c3a;
  --sage:#4a6e4a;--bdr:#2a2a4a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);min-height:100vh}

/* HEADER */
header{background:var(--paper);color:var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200}
header h1{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;letter-spacing:-.02em}
header h1 span{color:var(--gold)}
.tabs{display:flex;gap:5px}
.tab{padding:6px 16px;border:2px solid var(--ink);background:transparent;color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.tab.on,.tab:hover{background:var(--ink);color:var(--paper)}

main{max-width:860px;margin:0 auto;padding:24px 14px}
.panel{display:none}.panel.on{display:block}

/* CARDS */
.card{background:var(--cream);color:var(--ink);border:2px solid var(--bdr);border-radius:3px;padding:20px;margin-bottom:16px}
.card h2{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #c0b898}
label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;color:#5a4a38}
input[type=text],select,textarea{width:100%;padding:8px 11px;border:2px solid var(--bdr);background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.88rem;border-radius:2px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:52px;font-size:.8rem}

/* BOUTONS */
.btn{padding:8px 20px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;border-radius:2px}
.btn-ink{background:var(--ink);color:var(--paper)}.btn-ink:hover{background:#2e2e50}
.btn-gold{background:var(--gold);color:var(--ink)}.btn-gold:hover{background:var(--gold-l)}
.btn-rust{background:var(--rust);color:#fff}
.btn-red{background:#a0201a;color:#fff}
.btn-sm{padding:5px 12px;font-size:.74rem}

/* LIGNES DE MOTS */
.word-list{margin-top:8px}
.word-row{display:grid;grid-template-columns:130px 1fr 90px 28px;gap:7px;align-items:start;margin-bottom:7px;background:var(--paper);padding:8px;border:1px solid #c8bfaa;border-radius:2px}
.img-col{display:flex;flex-direction:column;gap:4px}
.preview-img{width:60px;height:60px;object-fit:cover;border:4px solid #fff;outline:1px solid #c0b49a;box-shadow:0 2px 7px rgba(0,0,0,.14);display:none}
.pick-btn{font-size:.62rem;padding:4px;background:var(--sage);color:#fff;border:none;cursor:pointer;border-radius:2px;text-align:center}
.del-btn{margin-top:20px;padding:4px 7px;background:#a0201a;color:#fff;border:none;cursor:pointer;border-radius:2px;font-size:.75rem}
.bg-zone{border:2px dashed #c0b898;padding:10px;text-align:center;cursor:pointer;border-radius:2px;font-size:.78rem;color:#7a6a50;transition:border-color .2s}
.bg-zone:hover,.bg-zone.has{border-color:var(--gold);border-style:solid}

/* TOKEN */
.token-box{background:#1e2a1e;border:1px solid var(--sage);border-radius:3px;padding:12px 16px;font-size:.8rem;margin-bottom:14px;color:#c8e6c8;line-height:1.6}
.token-box a{color:var(--gold-l)}
.token-box input{margin-top:6px;background:#0d1a0d;border-color:var(--sage);color:#c8e6c8}

/* ════════════════════════
   FEUILLE A4
════════════════════════ */
.sheet{
  width:740px;
  min-height:1046px;
  background:var(--paper);
  color:var(--ink);
  margin:20px auto;
  padding:28px 32px 32px;
  border:2px solid var(--bdr);
  box-shadow:0 6px 28px rgba(0,0,0,.38);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* Titre centré, toujours dans le flux */
.sh-title-block{
  text-align:center;
  padding:0 96px 14px;
  flex-shrink:0;
  position:relative;
  z-index:2;
}
.sh-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:900;letter-spacing:-.02em;line-height:1.05;color:var(--ink)}
.sh-sub{font-size:.62rem;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-top:4px}

/* QR coin haut droit */
/* QR sticky dans le panneau jeu */
.play-wrap{display:flex;align-items:flex-start;gap:10px;justify-content:center}
.play-qr-col{flex-shrink:0;position:sticky;top:80px;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:4px}
.play-qr-frame{width:80px;height:80px;border:2.5px solid var(--bdr);padding:4px;background:#fff;box-shadow:2px 2px 0 rgba(0,0,0,.15)}
.play-qr-frame canvas,.play-qr-frame img{width:100%!important;height:100%!important;display:block}
.play-qr-lbl{font-size:.45rem;text-transform:uppercase;letter-spacing:.07em;color:var(--paper);text-align:center;max-width:80px}
.btn-edit-loop{display:flex;align-items:center;gap:6px;margin:16px auto 0;padding:10px 24px;background:var(--gold);color:var(--ink);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-edit-loop:hover{background:var(--gold-l)}

.sh-qr{position:absolute;top:28px;right:32px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:3px}
.sh-qr-frame{width:82px;height:82px;border:2.5px solid var(--bdr);padding:4px;background:#fff;box-shadow:2px 2px 0 var(--bdr)}
.sh-qr-frame canvas,.sh-qr-frame img{width:100%!important;height:100%!important;display:block}
.sh-qr-lbl{font-size:.5rem;text-transform:uppercase;letter-spacing:.08em;color:#888;text-align:center;max-width:84px}
.sh-qr-st{font-size:.52rem;text-align:center;max-width:84px;margin-top:1px}
.qr-ok{color:#2e7d32}.qr-err{color:var(--rust)}.qr-wait{color:#888}

/* Grille */
.sh-grid{display:flex;justify-content:center;margin-bottom:14px;flex-shrink:0;position:relative;z-index:2}
.xw{border-collapse:collapse;border:2.5px solid var(--bdr);box-shadow:2px 2px 0 rgba(26,26,46,.12)}
.xw td{position:relative;padding:0}
/* Case vide — blanc cassé, pas de noir */
.xb{background:#f2ede4;border:1px solid #e0d8cc}
/* Case avec lettre */
.xwc{background:#fff;border:1.5px solid #3a3a5a;cursor:pointer}
/* Surbrillances jeu */
.xwc.hi-word{background:#fef9e7}
.xwc.hi-cell{background:#fdebd0;border-color:var(--gold)}
/* Numéro */
.xn{position:absolute;top:1px;left:2px;font-family:'DM Mono',monospace;font-size:6px;font-weight:700;line-height:1;color:var(--ink);pointer-events:none}
/* Lettre (impression) */
.xl{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--ink);pointer-events:none}
/* Lettre (jeu) */
.xlj{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:700;text-transform:uppercase;pointer-events:none;color:#555}
.xlj.ok{color:#2e7d32}
.xlj.ko{color:var(--rust)}

/* Zone indices — s'étire jusqu'en bas */
.sh-clues-wrap{
  position:relative;
  flex:1;              /* occupe tout l'espace restant */
  display:flex;
  flex-direction:column;
}
/* Image de fond UNIQUEMENT derrière les indices */
.sh-clues-bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:0;
  transition:opacity .3s;
}
.sh-clues-grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 18px;
  flex:1;
}
.clues-col h3{font-family:'Playfair Display',serif;font-size:.73rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;border-bottom:1.5px solid var(--ink);padding-bottom:2px;margin-bottom:6px}
.clue{display:flex;gap:6px;align-items:flex-start;margin-bottom:4px;font-size:.67rem}
.cn{font-family:'DM Mono',monospace;font-weight:700;color:var(--rust);min-width:16px;flex-shrink:0;padding-top:1px}
.cbody{flex:1;line-height:1.3;color:#2a2020}
/* Passepartout image indice */
.cimg{width:36px;height:36px;object-fit:cover;flex-shrink:0;border:3px solid #fff;outline:1px solid #c0b49a;box-shadow:0 1px 5px rgba(0,0,0,.14)}

/* Barre d'actions */
.act-bar{width:740px;margin:0 auto 28px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

.loading{text-align:center;padding:44px;font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--gold);padding:10px 20px;border:2px solid var(--gold);font-size:.85rem;border-radius:2px;z-index:9999;animation:tin .25s ease;display:none}
@keyframes tin{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

@media print{
  body{background:#fff!important}
  header,.card,.act-bar,.tabs,.play-qr-col,.btn-edit-loop{display:none!important}
  .play-wrap{display:block}
  .sheet{margin:0!important;border:none!important;box-shadow:none!important;width:210mm!important;min-height:297mm!important;padding:12mm 14mm!important}
  @page{size:A4 portrait;margin:0}
}
@media(max-width:780px){
  .sheet,.act-bar{width:100%}
  .word-row{grid-template-columns:1fr 1fr}
  .sh-clues-grid{grid-template-columns:1fr}
  .sh-title-block{padding:0 0 14px}
  .sh-qr{position:static;margin:0 auto 10px}
}
</style>
</head>
<body>
<header>
  <h1>✦ Mots <span>Croisés</span></h1>
  <div class="tabs">
    <button class="tab on" onclick="go('edit',this)">Créer ma grille</button>
    <button class="tab"    onclick="go('play',this)">Jouer</button>
  </div>
</header>
<main>

<!-- ÉDITEUR -->
<div id="p-edit" class="panel on">
  <div class="card">
    <h2>Créer ma grille personnalisée</h2>
    <div class="token-box">
      🔑 <strong>Token GitHub requis pour le QR code</strong> —
      <a href="https://github.com/settings/tokens/new?description=MotsCroises&scopes=gist" target="_blank">Créer un token</a>
      (cochez uniquement <strong>gist</strong>). Mémorisé dans votre navigateur.
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="saveTok(this.value)">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div><label>Titre</label><input type="text" id="m-title" value="Ma Grille"></div>
      <div><label>Taille</label>
        <select id="m-size">
          <option value="10">10 × 10</option>
          <option value="13" selected>13 × 13</option>
          <option value="15">15 × 15</option>
        </select>
      </div>
      <div><label>Solution</label>
        <select id="m-sol">
          <option value="0">Grille vierge</option>
          <option value="1">Avec réponses</option>
        </select>
      </div>
    </div>
    <div class="word-list" id="m-words"></div>
    <div style="margin:8px 0 12px;display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-ink btn-sm" onclick="addRow()">+ Ajouter un mot</button>
      <button class="btn btn-ink btn-sm" onclick="document.getElementById('csv-f').click()">📄 CSV</button>
    </div>
    <input type="file" id="csv-f" accept=".csv" style="display:none" onchange="importCSV(event)">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div>
        <label>Image de fond (derrière les indices)</label>
        <div class="bg-zone" id="bgz" onclick="document.getElementById('bgf').click()">📷 Choisir une image</div>
        <input type="file" id="bgf" accept="image/*" style="display:none" onchange="loadBg(event)">
      </div>
      <div style="display:flex;flex-direction:column;justify-content:flex-end;gap:6px">
        <label>Opacité</label>
        <input type="range" id="m-op" min="2" max="28" value="8" style="width:100%" oninput="liveOp()">
      </div>
    </div>
    <button class="btn btn-gold" onclick="generate()">✦ Générer la grille</button>
  </div>
  <div id="o-edit"></div>
</div>

<!-- JEU -->
<div id="p-play" class="panel">
  <div id="o-play" style="padding:28px;text-align:center;color:#aaa;font-style:italic">
    Aucune grille chargée. Créez une grille et cliquez "Jouer", ou scannez un QR code.
  </div>
</div>

</main>
<div class="toast" id="toast"></div>
<script>
/* ═══════════════════════════════════
   CONFIG
═══════════════════════════════════ */
const GH_PAGES = 'https://roche-stephane.github.io/Mots-croises-Maintenance-Automobile/';

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let BG = null;      // image de fond (pleine résolution, pour affichage local)
let BG_OP = 8;      // opacité fond
let GRID = null;    // données grille courante

/* Jeu */
let sel = null;     // {r,c} cellule sélectionnée
let dir = 'H';      // direction courante
let ans = {};       // réponses joueur {r,c: lettre}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem('gh_tok');
  if(t) document.getElementById('gh-token').value = t;
  for(let i=0;i<5;i++) addRow();
  handleQR();
});

/* ═══════════════════════════════════
   TABS
═══════════════════════════════════ */
function go(id, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
}

/* ═══════════════════════════════════
   TOKEN
═══════════════════════════════════ */
function saveTok(v){ if(v.trim()) localStorage.setItem('gh_tok', v.trim()); }
function getTok(){ return localStorage.getItem('gh_tok')||''; }

/* ═══════════════════════════════════
   IMAGE DE FOND
═══════════════════════════════════ */
function loadBg(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    BG = ev.target.result;
    document.getElementById('bgz').textContent = '✓ ' + f.name;
    document.getElementById('bgz').classList.add('has');
    // Mise à jour live si la feuille est déjà affichée
    applyBgEl('sh-bg-edit', BG, BG_OP);
  };
  r.readAsDataURL(f);
}
function liveOp(){
  BG_OP = parseInt(document.getElementById('m-op').value);
  applyBgEl('sh-bg-edit', BG, BG_OP);
}
function applyBgEl(id, src, op){
  const el = document.getElementById(id); if(!el) return;
  if(src) el.style.backgroundImage = `url('${src}')`;
  el.style.opacity = op/100;
}

/* ═══════════════════════════════════
   COMPRESSION IMAGE (canvas)
   Réduit à maxPx × maxPx, JPEG, qualité q
═══════════════════════════════════ */
function compressImg(dataUrl, maxPx, q){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(img.width, img.height);
      const c = document.createElement('canvas');
      c.width = maxPx; c.height = maxPx;
      c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,maxPx,maxPx);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = () => res(null);
    img.src = dataUrl;
  });
}

/* ═══════════════════════════════════
   LIGNES DE MOTS
═══════════════════════════════════ */
let rc = 0;
function addRow(w='', c='', img=''){
  const id = ++rc;
  const d = document.createElement('div');
  d.className = 'word-row'; d.id = 'wr'+id;
  d.innerHTML = `
    <div><label>Mot</label>
      <input type="text" id="ww${id}" value="${w}" placeholder="MOT" style="text-transform:uppercase">
    </div>
    <div><label>Indice</label>
      <textarea id="wc${id}" placeholder="Définition…">${c}</textarea>
    </div>
    <div class="img-col"><label>Image</label>
      <img class="preview-img" id="wi${id}" ${img?`src="${img}" style="display:block"`:''}>
      <button class="pick-btn" onclick="document.getElementById('wf${id}').click()">📷 Choisir</button>
      <input type="file" id="wf${id}" accept="image/*" style="display:none" onchange="pickImg(event,${id})">
    </div>
    <button class="del-btn" onclick="document.getElementById('wr${id}').remove()">✕</button>`;
  document.getElementById('m-words').appendChild(d);
  if(img) document.getElementById('wi'+id).dataset.b = img;
}
function pickImg(e, id){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const im = document.getElementById('wi'+id);
    im.src = ev.target.result; im.style.display = 'block'; im.dataset.b = ev.target.result;
  };
  r.readAsDataURL(f);
}
function importCSV(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    ev.target.result.split('\n').forEach(l => { const p=l.split(','); if(p[0]) addRow(p[0].trim(),p[1]||''); });
    toast('CSV importé ✓');
  };
  r.readAsText(f);
}

/* ═══════════════════════════════════
   NORMALISE (accents → ASCII)
═══════════════════════════════════ */
function N(w){
  return w.toUpperCase()
    .replace(/[ÀÁÂÃÄ]/g,'A').replace(/[ÈÉÊË]/g,'E')
    .replace(/[ÌÍÎÏ]/g,'I').replace(/[ÒÓÔÕÖ]/g,'O')
    .replace(/[ÙÚÛÜ]/g,'U').replace(/Ç/g,'C')
    .replace(/[^A-Z]/g,'');
}

/* ═══════════════════════════════════
   MOTEUR MOTS CROISÉS
═══════════════════════════════════ */
function buildGrid(raws, size){
  const wl = [...new Set(raws.map(N).filter(w=>w.length>=2&&w.length<size))].sort((a,b)=>b.length-a.length);
  const grid = Array.from({length:size},()=>new Array(size).fill(null));
  const placed = [];

  function canPlace(word,row,col,dir){
    const len=word.length;
    if(dir==='H'){
      if(col+len>size) return false;
      if(col>0&&grid[row][col-1]) return false;
      if(col+len<size&&grid[row][col+len]) return false;
      for(let i=0;i<len;i++){
        const g=grid[row][col+i];
        if(g&&g!==word[i]) return false;
        if(!g){if(row>0&&grid[row-1][col+i]) return false; if(row<size-1&&grid[row+1][col+i]) return false;}
      }
    } else {
      if(row+len>size) return false;
      if(row>0&&grid[row-1][col]) return false;
      if(row+len<size&&grid[row+len][col]) return false;
      for(let i=0;i<len;i++){
        const g=grid[row+i][col];
        if(g&&g!==word[i]) return false;
        if(!g){if(col>0&&grid[row+i][col-1]) return false; if(col<size-1&&grid[row+i][col+1]) return false;}
      }
    }
    return true;
  }
  function doPlace(word,row,col,dir){
    for(let i=0;i<word.length;i++) dir==='H'?(grid[row][col+i]=word[i]):(grid[row+i][col]=word[i]);
    placed.push({word,row,col,dir});
  }
  function tryIntersect(word){
    for(const p of placed)
      for(let pi=0;pi<p.word.length;pi++)
        for(let wi=0;wi<word.length;wi++)
          if(p.word[pi]===word[wi]){
            if(p.dir==='H'){const r=p.row-wi,c=p.col+pi; if(r>=0&&canPlace(word,r,c,'V')){doPlace(word,r,c,'V');return true;}}
            else{const r=p.row+pi,c=p.col-wi; if(c>=0&&canPlace(word,r,c,'H')){doPlace(word,r,c,'H');return true;}}
          }
    return false;
  }
  if(wl.length) doPlace(wl[0],Math.floor(size/2),Math.floor((size-wl[0].length)/2),'H');
  for(let i=1;i<wl.length;i++){
    if(!tryIntersect(wl[i])){
      let ok=false;
      for(let t=0;t<300&&!ok;t++){
        const d=t%2?'V':'H',r=Math.floor(Math.random()*size),c=Math.floor(Math.random()*size);
        if(canPlace(wl[i],r,c,d)){doPlace(wl[i],r,c,d);ok=true;}
      }
    }
  }
  return {grid, placed, size};
}

function numberCells(placed, size){
  /* Retourne un objet "r,c" → numéro */
  const starts = new Set(placed.map(p=>p.row+','+p.col));
  const nums = {}; let n = 1;
  for(let r=0;r<size;r++) for(let c=0;c<size;c++)
    if(placed.some(p=>p.row<=r&&p.col<=c) && starts.has(r+','+c)) nums[r+','+c] = n++;
  placed.forEach(p=>{ p.num = nums[p.row+','+p.col]; });
  return nums;
}

function cpx(size){ return Math.floor(Math.min(640,440)/size); }

/* ═══════════════════════════════════
   RENDU HTML DE LA FEUILLE
   Utilisé IDENTIQUEMENT pour :
   - mode impression (print=true)
   - mode jeu (print=false)
═══════════════════════════════════ */
function renderSheet(data, print){
  const {grid,placed,size,title,clues,imgs,bg,op,showSol} = data;
  const cp = cpx(size);
  const sp = [...placed].sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);
  numberCells(sp, size);
  const across = sp.filter(p=>p.dir==='H').sort((a,b)=>a.num-b.num);
  const down   = sp.filter(p=>p.dir==='V').sort((a,b)=>a.num-b.num);
  const shId   = print ? 'sh-print' : 'sh-play';
  const bgId   = print ? 'sh-bg-edit' : 'sh-bg-play';

  /* Grille */
  let tbl = `<table class="xw">`;
  for(let r=0;r<size;r++){
    tbl += `<tr>`;
    for(let c=0;c<size;c++){
      const ch = grid[r][c];
      const sz = `width:${cp}px;height:${cp}px`;
      if(!ch){
        tbl += `<td class="xb" style="${sz}"></td>`;
      } else {
        const num = sp.find(p=>p.row===r&&p.col===c) ? sp.find(p=>p.row===r&&p.col===c).num||'' : '';
        // Cherche le numéro : une case peut être début de plusieurs mots
        const numVal = placed.filter(p=>p.row===r&&p.col===c).map(p=>p.num).filter(Boolean)[0]||'';
        if(print){
          tbl += `<td class="xwc" style="${sz}">
            <span class="xn">${numVal}</span>
            ${showSol?`<div class="xl">${ch}</div>`:''}
          </td>`;
        } else {
          tbl += `<td class="xwc" style="${sz}" data-r="${r}" data-c="${c}" data-a="${ch}" onclick="cellClick(this)">
            <span class="xn">${numVal}</span>
            <div class="xlj" id="xlj-${r}-${c}"></div>
          </td>`;
        }
      }
    }
    tbl += `</tr>`;
  }
  tbl += `</table>`;

  /* Indices — identiques dans les deux modes */
  function mkClues(list){
    return list.map(p => {
      const txt = clues[p.word]||p.word;
      const img = imgs && imgs[p.word];
      return `<div class="clue">
        <span class="cn">${p.num}.</span>
        ${img ? `<img class="cimg" src="${img}" alt="">` : ''}
        <span class="cbody">${txt} <em style="color:#bbb;font-size:.62em">(${p.word.length})</em></span>
      </div>`;
    }).join('');
  }

  /* Fond : on utilise bg (qui peut être haute résolution en local,
     ou compressée quand chargé via QR) */
  const bgStyle = bg ? `background-image:url('${bg}');opacity:${op/100}` : `opacity:0`;

  const qrBlock = print ? `
    <div class="sh-qr">
      <div class="sh-qr-frame" id="qr-el"></div>
      <div class="sh-qr-lbl">Scanner pour jouer</div>
      <div class="sh-qr-st qr-wait" id="qr-st">⏳ Génération…</div>
    </div>` : '';

  return `
  <div class="sheet" id="${shId}">
    ${qrBlock}
    <div class="sh-title-block">
      <div class="sh-title">${title}</div>
      <div class="sh-sub">Mots Croisés • ${sp.length} mots</div>
    </div>
    <div class="sh-grid">${tbl}</div>
    <div class="sh-clues-wrap">
      <div class="sh-clues-bg" id="${bgId}" style="${bgStyle}"></div>
      <div class="sh-clues-grid">
        <div class="clues-col"><h3>→ Horizontalement</h3>${mkClues(across)}</div>
        <div class="clues-col"><h3>↓ Verticalement</h3>${mkClues(down)}</div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════
   GÉNÉRER LA GRILLE
═══════════════════════════════════ */
async function generate(){
  const title   = document.getElementById('m-title').value.trim()||'Ma Grille';
  const size    = parseInt(document.getElementById('m-size').value);
  const showSol = document.getElementById('m-sol').value==='1';
  const op      = parseInt(document.getElementById('m-op').value);
  const words=[], clues={}, imgsRaw={};

  document.querySelectorAll('#m-words .word-row').forEach(row=>{
    const m = row.id.match(/wr(\d+)/); if(!m) return;
    const id = m[1];
    const wEl=document.getElementById('ww'+id), cEl=document.getElementById('wc'+id), iEl=document.getElementById('wi'+id);
    if(!wEl||!wEl.value.trim()) return;
    const w = N(wEl.value.trim()); if(w.length<2) return;
    words.push(w);
    clues[w] = cEl ? cEl.value.trim()||wEl.value.trim() : wEl.value.trim();
    const src = iEl && (iEl.dataset.b||(iEl.src&&iEl.src.startsWith('data:')?iEl.src:null));
    if(src) imgsRaw[w] = src;
  });

  if(words.length<2){ toast('Ajoutez au moins 2 mots !'); return; }

  const o = document.getElementById('o-edit');
  o.innerHTML = '<div class="loading">⌛ Génération…</div>';

  /* Compresser les images pour affichage local (64px) */
  const imgs = {};
  for(const [k,v] of Object.entries(imgsRaw))
    imgs[k] = await compressImg(v, 64, 0.7) || v;

  /* Compresser pour le Gist : images indices 60px, fond 320px */
  const imgsGist = {};
  for(const [k,v] of Object.entries(imgsRaw))
    imgsGist[k] = await compressImg(v, 60, 0.6) || null;

  const bgGist = BG ? await compressImg(BG, 320, 0.45) : null;

  setTimeout(()=>{
    const res = buildGrid(words, size);
    if(res.placed.length<2){
      o.innerHTML='<div class="card" style="color:var(--rust)">Trop peu de mots placés. Ajoutez-en davantage.</div>';
      return;
    }
    const sp = [...res.placed].sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);

    /* Données grille complètes */
    GRID = {grid:res.grid, placed:sp, size, title, clues, imgs, bg:BG, op, showSol};

    /* Afficher la feuille impression */
    const shHtml = renderSheet(GRID, true);
    o.innerHTML = shHtml + `
    <div class="act-bar">
      <button class="btn btn-ink"  onclick="doPrint()">🖨 Imprimer / PDF</button>
      <button class="btn btn-gold" onclick="doDownload()">💾 Télécharger HTML</button>
      <button class="btn btn-rust" onclick="doPlay()">▶ Jouer en ligne</button>
    </div>`;

    /* Publier le Gist et générer le QR */
    const meta = {
      g: res.grid.map(row=>row.map(c=>c||'').join('')).join('|'),
      p: sp.map(p=>`${p.word},${p.row},${p.col},${p.dir==='H'?0:1}`).join(';'),
      c: Object.entries(clues).map(([k,v])=>`${k}:${v.substring(0,120)}`).join('~'),
      t: title, s: size, op,
    };
    publishAndQR(meta, imgsGist, bgGist);
  }, 60);
}

/* ═══════════════════════════════════
   PUBLIER GIST + GÉNÉRER QR
   Chaque image est un fichier séparé
   dans le Gist pour éviter la limite
   de taille du fichier JSON principal.
═══════════════════════════════════ */
async function publishAndQR(meta, imgs, bgData){
  const stEl = document.getElementById('qr-st');
  const qrEl = document.getElementById('qr-el');
  if(!qrEl) return;
  if(stEl){ stEl.textContent='⏳ Publication…'; stEl.className='sh-qr-st qr-wait'; }

  const tok = getTok();
  if(!tok){
    if(stEl){ stEl.textContent='⚠ Token requis'; stEl.className='sh-qr-st qr-err'; }
    toast('⚠ Collez votre token GitHub pour activer le QR');
    return;
  }

  /* Construire les fichiers du Gist */
  const files = { 'meta.json': { content: JSON.stringify(meta) } };
  /* Images indices : un fichier par mot */
  for(const [word, b64] of Object.entries(imgs)){
    if(b64) files[`i_${word}.b64`] = { content: b64 };
  }
  /* Image de fond */
  if(bgData) files['bg.b64'] = { content: bgData };

  try{
    const res = await fetch('https://api.github.com/gists',{
      method:'POST',
      headers:{
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json',
        'X-GitHub-Api-Version':'2022-11-28',
        'Authorization':'Bearer '+tok
      },
      body: JSON.stringify({ description:'Mots Croisés', public:true, files })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({message:res.status})); throw new Error(e.message); }
    const gistId = (await res.json()).id;
    const playUrl = GH_PAGES + '?g=' + gistId;
    GRID.playUrl = playUrl;

    qrEl.innerHTML = '';
    new QRCode(qrEl,{ text:playUrl, width:74, height:74, colorDark:'#1a1a2e', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
    if(stEl){ stEl.textContent='✓ QR prêt'; stEl.className='sh-qr-st qr-ok'; }
    toast('✓ QR actif — scannable depuis n\'importe quel iPhone !');

    // Mettre à jour le QR de la colonne latérale si en mode jeu
    const lqEl = document.getElementById('play-qr-el');
    if(lqEl){ lqEl.innerHTML=''; new QRCode(lqEl,{text:playUrl,width:72,height:72,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M}); }
  }catch(err){
    if(stEl){ stEl.textContent='⚠ Erreur : '+err.message; stEl.className='sh-qr-st qr-err'; }
    console.error('Gist error:',err);
  }
}

/* ═══════════════════════════════════
   MODE JEU (local)
═══════════════════════════════════ */
function doPlay(){
  if(!GRID){ toast('Aucune grille.'); return; }
  startPlay(GRID);
  go('play', document.querySelectorAll('.tab')[1]);
  window.scrollTo(0,0);
}

function backToEdit(){
  go('edit', document.querySelectorAll('.tab')[0]);
  window.scrollTo(0,0);
}

function startPlay(data){
  sel=null; dir='H'; ans={};
  // Mémoriser la data pour pouvoir revenir à l'édition
  window._lastPlayData = data;
  const shHtml = renderSheet(data, false);

  // Extraire le QR code (URL de jeu) si disponible
  const playQR = data.playUrl || '';
  const qrColHtml = `<div class="play-qr-col" id="play-qr-col">
    <div class="play-qr-frame" id="play-qr-el"></div>
    <div class="play-qr-lbl">Scanner pour jouer</div>
  </div>`;

  document.getElementById('o-play').innerHTML = `
  <div class="play-wrap">
    ${qrColHtml}
    <div style="flex:1;min-width:0">
      ${shHtml}
      <div class="act-bar">
        <button class="btn btn-ink btn-sm"  onclick="checkAll()">✓ Vérifier</button>
        <button class="btn btn-gold btn-sm" onclick="solveAll()">💡 Solution</button>
        <button class="btn btn-red btn-sm"  onclick="resetPlay()">↺ Recommencer</button>
      </div>
      <div style="text-align:center;padding-bottom:20px">
        <button class="btn-edit-loop" onclick="backToEdit()">✎ Modifier la grille</button>
      </div>
    </div>
  </div>`;

  // Générer le QR dans la colonne latérale
  setTimeout(()=>{
    const qrEl = document.getElementById('play-qr-el');
    if(qrEl && playQR){
      qrEl.innerHTML='';
      new QRCode(qrEl,{text:playQR,width:72,height:72,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    } else if(qrEl){
      qrEl.style.background='#eee';
      qrEl.style.display='flex';
      qrEl.style.alignItems='center';
      qrEl.style.justifyContent='center';
      qrEl.style.fontSize='.5rem';
      qrEl.style.color='#888';
      qrEl.style.textAlign='center';
      qrEl.innerHTML='QR disponible<br>après publication';
    }
  }, 100);

  document.removeEventListener('keydown', onKey);
  document.addEventListener('keydown', onKey);
}

/* ═══════════════════════════════════
   NAVIGATION CLAVIER + CLIC
═══════════════════════════════════ */
function cellClick(td){
  const r=+td.dataset.r, c=+td.dataset.c;
  if(sel && sel.r===r && sel.c===c){
    /* Même case : basculer direction */
    const hOk = GRID.placed.some(p=>p.dir==='H'&&p.row===r&&c>=p.col&&c<p.col+p.word.length);
    const vOk = GRID.placed.some(p=>p.dir==='V'&&p.col===c&&r>=p.row&&r<p.row+p.word.length);
    if(hOk&&vOk) dir = dir==='H'?'V':'H';
  } else {
    sel = {r,c};
    const hOk = GRID.placed.some(p=>p.dir==='H'&&p.row===r&&c>=p.col&&c<p.col+p.word.length);
    const vOk = GRID.placed.some(p=>p.dir==='V'&&p.col===c&&r>=p.row&&r<p.row+p.word.length);
    if(hOk&&!vOk) dir='H';
    else if(vOk&&!hOk) dir='V';
  }
  hilite();
}

function hilite(){
  document.querySelectorAll('#sh-play .xwc').forEach(td=>td.classList.remove('hi-word','hi-cell'));
  if(!sel) return;
  const {r,c} = sel;
  /* Surligner le mot actif */
  const word = GRID.placed.find(p=>{
    if(p.dir!==dir) return false;
    return dir==='H' ? (p.row===r&&c>=p.col&&c<p.col+p.word.length)
                     : (p.col===c&&r>=p.row&&r<p.row+p.word.length);
  });
  if(word){
    for(let i=0;i<word.word.length;i++){
      const tr=dir==='H'?word.row:word.row+i, tc=dir==='H'?word.col+i:word.col;
      const el=document.querySelector(`#sh-play td[data-r="${tr}"][data-c="${tc}"]`);
      if(el) el.classList.add('hi-word');
    }
  }
  const cur = document.querySelector(`#sh-play td[data-r="${r}"][data-c="${c}"]`);
  if(cur){ cur.classList.remove('hi-word'); cur.classList.add('hi-cell'); }
}

function onKey(e){
  if(!sel) return;
  let {r,c} = sel;

  if(e.key==='ArrowRight'){e.preventDefault();dir='H';moveSel(r,c+1);return;}
  if(e.key==='ArrowLeft') {e.preventDefault();dir='H';moveSel(r,c-1);return;}
  if(e.key==='ArrowDown') {e.preventDefault();dir='V';moveSel(r+1,c);return;}
  if(e.key==='ArrowUp')   {e.preventDefault();dir='V';moveSel(r-1,c);return;}

  if(e.key==='Backspace'||e.key==='Delete'){
    e.preventDefault();
    const key=r+','+c;
    if(ans[key]){ delete ans[key]; drawCell(r,c,''); }
    else {
      const pr=dir==='H'?r:r-1, pc=dir==='H'?c-1:c;
      if(pr>=0&&pc>=0&&GRID.grid[pr]?.[pc]){
        sel={r:pr,c:pc}; delete ans[pr+','+pc]; drawCell(pr,pc,''); hilite();
      }
    }
    return;
  }

  const letter = N(e.key);
  if(letter.length!==1) return;
  e.preventDefault();

  ans[r+','+c] = letter;
  const correct = letter === (GRID.grid[r]?.[c]||'');
  drawCell(r, c, letter, correct?'ok':'ko');
  advance();
}

function moveSel(r,c){
  if(r<0||r>=GRID.size||c<0||c>=GRID.size) return;
  if(!GRID.grid[r]?.[c]) return;
  sel={r,c}; hilite();
}

function advance(){
  if(!sel) return;
  const {r,c} = sel;
  /* Trouver le mot actif */
  const word = GRID.placed.find(p=>{
    if(p.dir!==dir) return false;
    return dir==='H'?(p.row===r&&c>=p.col&&c<p.col+p.word.length)
                    :(p.col===c&&r>=p.row&&r<p.row+p.word.length);
  });
  if(!word){ moveSel(dir==='H'?r:r+1, dir==='H'?c+1:c); return; }
  /* Trouver la prochaine case vide dans le mot */
  const startIdx = dir==='H'?c-word.col:r-word.row;
  for(let i=startIdx+1;i<word.word.length;i++){
    const nr=dir==='H'?word.row:word.row+i;
    const nc=dir==='H'?word.col+i:word.col;
    if(!ans[nr+','+nc]){ sel={r:nr,c:nc}; hilite(); return; }
  }
  /* Mot complet : avancer d'une case quand même */
  const nr=dir==='H'?r:r+1, nc=dir==='H'?c+1:c;
  if(nr>=0&&nr<GRID.size&&nc>=0&&nc<GRID.size&&GRID.grid[nr]?.[nc]){ sel={r:nr,c:nc}; hilite(); }
}

function drawCell(r,c,letter,cls=''){
  const el=document.getElementById(`xlj-${r}-${c}`); if(!el) return;
  el.textContent=letter; el.className='xlj'+(cls?' '+cls:'');
}

function checkAll(){
  let ok=0,tot=0;
  document.querySelectorAll('#sh-play td[data-a]').forEach(td=>{
    tot++;
    const r=td.dataset.r,c=td.dataset.c,a=td.dataset.a;
    const v=ans[r+','+c]||'';
    if(v===a){ok++;drawCell(+r,+c,v,'ok');}
    else if(v) drawCell(+r,+c,v,'ko');
  });
  toast(`${ok}/${tot} lettres correctes !`);
}
function solveAll(){
  document.querySelectorAll('#sh-play td[data-a]').forEach(td=>{
    const r=+td.dataset.r,c=+td.dataset.c,a=td.dataset.a;
    ans[r+','+c]=a; drawCell(r,c,a,'ok');
  });
}
function resetPlay(){
  ans={}; sel=null;
  document.querySelectorAll('#sh-play .xwc').forEach(td=>td.classList.remove('hi-word','hi-cell'));
  document.querySelectorAll('#sh-play td[data-a]').forEach(td=>{
    const r=+td.dataset.r,c=+td.dataset.c; drawCell(r,c,'');
  });
}

/* ═══════════════════════════════════
   CHARGEMENT DEPUIS QR
   ?g=<gistId> dans l'URL
═══════════════════════════════════ */
async function handleQR(){
  const gistId = new URLSearchParams(window.location.search).get('g');
  if(!gistId) return;

  const playEl = document.getElementById('o-play');
  playEl.innerHTML = '<div class="loading">⌛ Chargement de la grille…</div>';
  go('play', document.querySelectorAll('.tab')[1]);

  try{
    const res = await fetch(`https://api.github.com/gists/${gistId}`,{
      headers:{'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}
    });
    if(!res.ok) throw new Error('Grille introuvable ('+res.status+')');
    const gist = await res.json();

    /* Lire meta.json */
    const meta = JSON.parse(gist.files['meta.json'].content);
    const size = meta.s;

    /* Reconstruire la grille */
    const grid = meta.g.split('|').map(row=>[...row].map(c=>c===''?null:c));

    /* Reconstruire placed */
    const placed = meta.p.split(';').map(s=>{
      const [word,r,c,d] = s.split(',');
      return {word, row:+r, col:+c, dir:+d===0?'H':'V'};
    });

    /* Reconstruire les indices */
    const clues={};
    meta.c.split('~').forEach(kv=>{ const i=kv.indexOf(':'); if(i>0) clues[kv.slice(0,i)]=kv.slice(i+1); });

    /* Récupérer les images indices depuis les fichiers du Gist */
    const imgs={};
    for(const [fname, fdata] of Object.entries(gist.files)){
      if(fname.startsWith('i_')&&fname.endsWith('.b64')){
        const word = fname.slice(2,-4);
        imgs[word] = fdata.content;
      }
    }

    /* Récupérer l'image de fond */
    const bg = gist.files['bg.b64'] ? gist.files['bg.b64'].content : null;

    GRID = { grid, placed, size, title:meta.t, clues, imgs, bg, op:meta.op||8, showSol:false };
    GRID.playUrl = window.location.href;
    startPlay(GRID);
  }catch(err){
    playEl.innerHTML=`<div style="padding:24px;color:#c45c3a;text-align:center">
      <strong>Impossible de charger la grille.</strong><br><small>${err.message}</small>
    </div>`;
    console.error(err);
  }
}

/* ═══════════════════════════════════
   IMPRESSION / TÉLÉCHARGEMENT
═══════════════════════════════════ */
function doPrint(){
  const el=document.getElementById('sh-print'); if(!el) return;
  const css=document.querySelector('style').textContent;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>body{margin:0;background:#f5f0e8}${css}
    @media print{@page{size:A4 portrait;margin:0}body{background:#fff!important}
    .sheet{margin:0!important;border:none!important;box-shadow:none!important;width:210mm!important;min-height:297mm!important;padding:12mm 14mm!important}}</style>
    </head><body>${el.outerHTML}<script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}
function doDownload(){
  const el=document.getElementById('sh-print'); if(!el) return;
  const title = GRID?.title||'grille';
  const css=document.querySelector('style').textContent;
  const h=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>body{margin:0;padding:20px;background:#f5f0e8}${css}</style>
    </head><body>${el.outerHTML}</body></html>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h],{type:'text/html'}));
  a.download=title.replace(/\s+/g,'-')+'.html';
  a.click(); toast('Téléchargé ✓');
}

/* TOAST */
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(_tt); _tt=setTimeout(()=>t.style.display='none',3500);
}
